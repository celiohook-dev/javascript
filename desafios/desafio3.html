<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 3</title>
    <style>
        div{
            background-color: lightgrey;
            width: 250px;
            height: 100px;
            line-height: 100px;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div id="res" onclick="antecessor()">Antecessor e Sucessor</div>

    <script>
        function antecessor () {
            let numero = window.prompt("Digite um número qualquer!")
            let sucessor =numero + 1;
            let antecessor = numero - 1;
           
            alert(`Antes de ${numero}, temos o número ${antecessor} Depois de ${numero}, temos o número ${sucessor}`)
            
        }


    </script>
</body>
</html>
