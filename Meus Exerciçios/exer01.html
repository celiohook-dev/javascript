<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercitando</title>
</head>
<body>
    <h1>Calculadora Simples </h1>
    <input type="number" name="tn1" id="tn1"> +
    <input type="number" name="tn2" id="tn2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res"> Resultado</div>

    <script>

        function somar () {
    var bn1= window.document.getElementById('txn1')
    var bn2= window.document.querySelector('input#txn2')
    var res =window.document.getElementById('res')
    var n1 = Number(tn1.value)
    var n2 = Number(tn2.value)
    var soma = n1 + n2
    res.innerText= `O resultado da soma entre ${n1} e ${n2} é igual a ${soma}`
        }






    </script>
      

    

</body>
</html>
