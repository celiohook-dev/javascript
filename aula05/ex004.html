<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex004</title>
    <style>
        body{
            background-color: aqua;
            font: normal 20pt arial;
            
        }
    </style>
</head>
<body>
    <script>
  var nome = window.prompt('Qual é o seu nome ?')
  document.write(` Olá, ${nome} seu nome  tem ${nome.length} letras.`)
document.writeln(`Seu nome em maiúsculas é ${nome.toLocaleUpperCase()} `)
document.writeln(`Seu nome em minúscula é ${nome.toLocaleLowerCase()} ` )

    </script>
</body>
</html>
