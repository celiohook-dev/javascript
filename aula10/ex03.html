<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições</title>
</head>
<body>
    <h1>Sistemas de Multa</h1>

    velocidade do carro <input type="number" name="txtvel" id="txtvel"> km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">Resultado</div>
    <script>
   
   
   function calcular (){
  
    var txtv=window.document.getElementById('txtvel')
    var res = window.document.getElementById('res')
    var vel = Number(txtv.value)
    
    res.innerHTML=`Sua velocidade actual é de ${vel} km/h`
    res.innerHTML +=` <br> Dirija sempre com cinto de segurança`
   
    if (vel > 60){

    res.innerHTML += "<p> Voçe está <strong> MULTADO </strong> por excesso de velocidade! </p>"
    }




   }

    </script>
</body>
</html>
